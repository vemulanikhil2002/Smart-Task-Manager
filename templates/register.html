{% extends "base.html" %}
{% block title %}Register – Smart Task Manager{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">📋</div>
      <h1>Create Account</h1>
      <p>Start managing your tasks today</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="johndoe" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
  </div>
</div>
{% endblock %}
